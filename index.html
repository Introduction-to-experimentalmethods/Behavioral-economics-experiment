<!DOCTYPE html>
<html>
<head>
    <title>Redirecting...</title>
    <script>
        // Add your Google Form links inside the quotes below
        const surveys = [
            "https://docs.google.com/forms/d/1SPsUg-7mFZAZqfCVoNxZixDOg-Svv_qdSyDgn9nalWc/prefill",     
 "https://docs.google.com/forms/d/1btAi6FuW-myhyaM3UNo6tlaqhj7ftmfR3w3dcdK0fvk/prefill"
        ];

        // This picks a random link from the list above
        const randomLink = surveys[Math.floor(Math.random() * surveys.length)];

        // This sends the user to that link
        window.location.replace(randomLink);
    </script>
</head>
<body>
    <p>Loading survey, please wait...</p>
</body>
</html>
